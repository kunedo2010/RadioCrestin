<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumpără produsul</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .price {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            color: #0077ff;
        }
        .btn-whatsapp {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Comandă produsul</h1>
        <p>Aici poți finaliza comanda pentru produsul tău.</p>

        <img src="images/produs.jpg" alt="Produs" style="width:100%; max-width:300px; margin:20px auto; display:block;">

        <div class="price">Preț: 29€</div>

        <p>Dacă dorești să comanzi, apasă pe butonul de mai jos și vei fi redirecționat direct pe WhatsApp.</p>

        <a class="btn-whatsapp" href="https://wa.me/4917634613184?text=Bună%2C%20vreau%20să%20cumpăr%20produsul%20de%2029€">
            Comandă pe WhatsApp
        </a>
    </div>

</body>
</html>
